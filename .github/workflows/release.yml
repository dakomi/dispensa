name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.9.1)'
        required: true
        default: 'v0.1.9.1'
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'false'
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          else
            echo "KEYSTORE_PATH not set — APK will be unsigned" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build fdroid release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleFdroidRelease

      - name: Build play release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assemblePlayRelease

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APKs
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          mv app/build/outputs/apk/fdroid/release/*.apk \
             "app/build/outputs/apk/fdroid/release/dispensa-${TAG}-fdroid.apk"
          mv app/build/outputs/apk/play/release/*.apk \
             "app/build/outputs/apk/play/release/dispensa-${TAG}-play.apk"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          PRERELEASE="${{ github.event.inputs.prerelease || 'false' }}"
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then PRERELEASE_FLAG="--prerelease"; fi

          printf '%s\n' \
            "## Dispensa $TAG" \
            "" \
            "### Downloads" \
            "| Variant | Description |" \
            "|---------|-------------|" \
            "| \`dispensa-${TAG}-fdroid.apk\` | F-Droid build (no proprietary dependencies) |" \
            "| \`dispensa-${TAG}-play.apk\` | Google Play build (includes ML Kit, Drive sync) |" \
            "" \
            "### Setup" \
            "Required GitHub secrets for signed builds: \`KEYSTORE_BASE64\`, \`KEYSTORE_PASSWORD\`, \`KEY_ALIAS\`, \`KEY_PASSWORD\`." \
            > /tmp/release_notes.md

          gh release create "$TAG" \
            --title "Dispensa $TAG" \
            --notes-file /tmp/release_notes.md \
            $PRERELEASE_FLAG \
            app/build/outputs/apk/fdroid/release/dispensa-${TAG}-fdroid.apk \
            app/build/outputs/apk/play/release/dispensa-${TAG}-play.apk
